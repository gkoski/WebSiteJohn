# Configuraçőes do Banco de Dados (Integraçăo com MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/mrjohn_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Configuraçőes do Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.docker.compose.enabled=false

# JWT
jwt.secret=mrjohn-sports-bar-secret-key-2026-muito-segura
jwt.expiration=86400000

# Upload de arquivos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.dir=uploads/