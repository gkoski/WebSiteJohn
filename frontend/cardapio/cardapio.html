<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardápio - Mr. John Sports Bar</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23C5392B'/><text x='50%25' y='70%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia, serif' font-weight='900' font-style='italic' font-size='40' fill='%23F2E5D0'>J</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Bagel+Fat+One&family=Caveat+Brush&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="cardapio.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <img src="../assets/logo-mrjohn.webp" alt="Logo Mr. John Sports Bar" class="header-logo">
      <h1>Cardápio</h1>
      <nav class="header-nav">
        <span id="nomeUsuario" class="usuario-nome"></span>
        <a href="../checkout/acompanhamento.html" class="nav-link">Meus Pedidos</a>
        <button onclick="logout()" class="btn-logout">Sair</button>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="menu" id="menuLista"></div>
  </div>

  <div id="carrinhoLateral" class="sidebar-carrinho">
    <div class="sidebar-header">
      <h2>Seu Pedido</h2>
      <button onclick="toggleCarrinho()" class="btn-fechar">X</button>
    </div>

    <div id="itensCarrinhoLateral"></div>

    <div class="sidebar-footer">
      <h3 id="totalCarrinho">Total: R$ 0,00</h3>
      <button class="btn-finalizar" onclick="irParaCheckout()">Finalizar Pedido</button>
    </div>
  </div>

  <div class="cart-status" onclick="toggleCarrinho()">
    Itens: <span id="qtd-itens">0</span> | Ver Pedido
  </div>

  <script src="../config.js"></script>
  <script src="../auth.js"></script>
  <script src="../shared.js"></script>
  <script src="cardapio.js"></script>
</body>
</html>
