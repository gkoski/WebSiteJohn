<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio - John's Burguer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cardapio.css">
    <style>
        .cart-status {
            background: #ff0000;
            padding: 10px 20px;
            border-radius: 50px;
            position: fixed;
            bottom: 20px;
            right: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
            z-index: 1000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>CARDÁPIO - John's Burguer</h1>
    </header>

    <div class="container">
        <div class="menu" id="menuLista">
            </div>
    </div>

    <div id="carrinhoLateral" class="sidebar-carrinho">
        <div class="sidebar-header">
            <h2>Seu Pedido</h2>
            <button onclick="toggleCarrinho()" class="btn-fechar">X</button>
        </div>
        
        <div id="itensCarrinhoLateral">
            </div>

        <div class="sidebar-footer">
            <h3 id="totalCarrinho">Total: R$ 0,00</h3>
            <button class="btn-finalizar" onclick="irParaCheckout()">Finalizar Pedido ✅</button>
        </div>
    </div>

    <div class="cart-status" onclick="toggleCarrinho()">
        🛒 Itens: <span id="qtd-itens">0</span> | Ver Pedido
    </div>

    <script src="cardapio.js"></script>
</body>
