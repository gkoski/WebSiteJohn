<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Acompanhamento do Pedido - Mr. John Sports Bar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="acompanhamento.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <img
        src="https://painel.lipplead.com/wp-content/uploads/2026/03/sem20fundo202062201_converted.webp"
        alt="Mr. John Sports Bar"
        class="header-logo"
      >
      <h1>Acompanhamento do Pedido</h1>
    </div>
  </header>

  <main class="container">

    <!-- Timeline -->
    <section class="timeline-section">
      <h2 class="section-title">Status do Pedido</h2>

      <div class="timeline">

        <div class="timeline-step completed" id="step-recebido">
          <div class="step-icon">✔</div>
          <div class="step-connector"></div>
          <div class="step-label">Recebido</div>
          <div class="step-time" id="time-recebido">--:--</div>
        </div>

        <div class="timeline-step" id="step-preparando">
          <div class="step-icon">🍔</div>
          <div class="step-connector"></div>
          <div class="step-label">Preparando</div>
          <div class="step-time" id="time-preparando">--:--</div>
        </div>

        <div class="timeline-step" id="step-enviado">
          <div class="step-icon">🛵</div>
          <div class="step-connector"></div>
          <div class="step-label">Enviado</div>
          <div class="step-time" id="time-enviado">--:--</div>
        </div>

        <div class="timeline-step" id="step-entregue">
          <div class="step-icon">🏠</div>
          <div class="step-connector last"></div>
          <div class="step-label">Entregue</div>
          <div class="step-time" id="time-entregue">--:--</div>
        </div>

      </div>
    </section>

    <!-- Resumo do Pedido -->
    <section class="order-summary">
      <h2 class="section-title">Itens do Pedido</h2>

      <div class="order-card">
        <div id="lista-itens" class="items-list">
          <p class="empty-msg">Carregando itens...</p>
        </div>

        <div class="order-total">
          <span>Total</span>
          <span id="valor-total" class="total-value">R$ 0,00</span>
        </div>
      </div>
    </section>

    <div class="actions">
      <a href="../cardapio/cardapio.html" class="btn-voltar">← Voltar ao Cardápio</a>
    </div>

  </main>

  <script src="../config.js"></script>
  <script>
    // ============================================================
    // ACOMPANHAMENTO — lê pedido do localStorage e exibe timeline
    // ============================================================

    const STATUS_ORDER = ['RECEBIDO', 'PREPARANDO', 'ENVIADO', 'ENTREGUE'];
    const STATUS_MAP = {
      RECEBIDO:   'step-recebido',
      PREPARANDO: 'step-preparando',
      ENVIADO:    'step-enviado',
      ENTREGUE:   'step-entregue',
    };

    function formatarMoeda(valor) {
      return 'R$ ' + Number(valor).toFixed(2).replace('.', ',');
    }

    function formatarHora(isoString) {
      if (!isoString) return '--:--';
      const d = new Date(isoString);
      return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function atualizarTimeline(statusAtual) {
      const indexAtual = STATUS_ORDER.indexOf(statusAtual?.toUpperCase());

      STATUS_ORDER.forEach((status, index) => {
        const stepId = STATUS_MAP[status];
        const el = document.getElementById(stepId);
        if (!el) return;

        el.classList.remove('completed', 'active', 'pending');

        if (index < indexAtual) {
          el.classList.add('completed');
        } else if (index === indexAtual) {
          el.classList.add('active');
        } else {
          el.classList.add('pending');
        }
      });
    }

    function renderizarItens(itens) {
      const lista = document.getElementById('lista-itens');
      if (!itens || itens.length === 0) {
        lista.innerHTML = '<p class="empty-msg">Nenhum item encontrado.</p>';
        return;
      }

      lista.innerHTML = itens.map(item => `
        <div class="item-row">
          <div class="item-info">
            <span class="item-qty">${item.quantidade}x</span>
            <span class="item-nome">${item.nomeProduto || item.nome || 'Produto'}</span>
          </div>
          <span class="item-preco">${formatarMoeda((item.precoUnitario || item.preco || 0) * item.quantidade)}</span>
        </div>
      `).join('');
    }

    async function carregarPedido() {
      // Tenta pegar o pedido do localStorage (salvo no checkout)
      const pedidoSalvo = localStorage.getItem('pedidoAtual');

      if (pedidoSalvo) {
        const pedido = JSON.parse(pedidoSalvo);
        atualizarTimeline(pedido.status || 'RECEBIDO');
        renderizarItens(pedido.itens || pedido.pedidoItens || []);
        document.getElementById('valor-total').textContent = formatarMoeda(pedido.valorTotal || 0);
        return;
      }

      // Se não houver no localStorage, busca o último pedido do usuário na API
      try {
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!usuarioLogado) {
          document.getElementById('lista-itens').innerHTML = '<p class="empty-msg">Faça login para ver seu pedido.</p>';
          return;
        }

        const response = await fetch(CONFIG.url('pedidos') + '/usuario/' + usuarioLogado.id);
        if (!response.ok) throw new Error('Erro ao buscar pedido');

        const pedidos = await response.json();
        // Pega o pedido mais recente
        const pedido = Array.isArray(pedidos) ? pedidos[pedidos.length - 1] : pedidos;

        atualizarTimeline(pedido.status || 'RECEBIDO');
        renderizarItens(pedido.itens || pedido.pedidoItens || []);
        document.getElementById('valor-total').textContent = formatarMoeda(pedido.valorTotal || 0);

      } catch (err) {
        console.error('Erro ao carregar pedido:', err);
        document.getElementById('lista-itens').innerHTML = '<p class="empty-msg">Não foi possível carregar o pedido.</p>';
      }
    }

    window.onload = carregarPedido;
  </script>

</body>
</html>
