<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Mr. John Sports Bar</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23C5392B'/><text x='50%25' y='70%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia, serif' font-weight='900' font-style='italic' font-size='40' fill='%23F2E5D0'>J</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Bagel+Fat+One&family=Caveat+Brush&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="checkout.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <img src="../assets/logo-mrjohn.webp" alt="Logo Mr. John Sports Bar" class="header-logo">
      <h1>Checkout</h1>
    </div>
  </header>

  <div class="container">
    <h2>Resumo do Pedido</h2>

    <div id="lista-itens"></div>

    <h3>Endereço de Entrega</h3>

    <div class="campo">
      <label for="cep">CEP</label>
      <input type="text" id="cep" placeholder="00000-000" maxlength="9" inputmode="numeric">
      <span class="cep-status" id="cepStatus"></span>
    </div>

    <div class="campo">
      <label for="rua">Rua</label>
      <input type="text" id="rua" placeholder="Preenchido pelo CEP">
    </div>

    <div class="campo">
      <label for="bairro">Bairro</label>
      <input type="text" id="bairro" placeholder="Preenchido pelo CEP">
    </div>

    <div class="campo-linha">
      <div class="campo">
        <label for="numero">Número</label>
        <input type="text" id="numero" placeholder="Ex: 123">
      </div>
      <div class="campo">
        <label for="complemento">Complemento</label>
        <input type="text" id="complemento" placeholder="Apto, bloco (opcional)">
      </div>
    </div>

    <h3>Observações</h3>
    <textarea id="observacoes" rows="3" placeholder="Ex: sem cebola, entregar na portaria..."></textarea>

    <!-- Aviso de fora de alcance -->
    <div class="aviso-entrega" id="avisoEntrega" style="display:none;"></div>

    <!-- Resumo de valores -->
    <div class="resumo-valores">
      <div class="linha">
        <span>Subtotal</span>
        <span id="subtotal">R$ 0,00</span>
      </div>
      <div class="linha">
        <span>Frete</span>
        <span id="frete">—</span>
      </div>
      <div class="linha total">
        <span>Total</span>
        <span id="total">R$ 0,00</span>
      </div>
    </div>

    <button id="btnConfirmar" onclick="finalizarPedido()" disabled>Confirmar Pedido</button>
  </div>

  <script src="../config.js"></script>
  <script src="../auth.js"></script>
  <script src="../shared.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
