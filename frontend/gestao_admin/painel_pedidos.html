<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Pedidos - Mr. John Sports Bar</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23C5392B'/><text x='50%25' y='70%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia, serif' font-weight='900' font-style='italic' font-size='40' fill='%23F2E5D0'>J</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Bagel+Fat+One&family=Caveat+Brush&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="painel_pedidos.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <img
        src="../assets/logo-mrjohn.webp"
        alt="Logo Mr. John Sports Bar"
        class="header-logo"
        onerror="this.style.display='none'"
      >
      <h1>Painel de Pedidos</h1>
      <nav class="admin-nav">
        <span id="nomeUsuario" class="usuario-nome"></span>
        <a href="menu.html" class="nav-link">Cardápio</a>
        <a href="painel_pedidos.html" class="nav-link active">Pedidos</a>
        <button onclick="logout()" class="btn-logout">Sair</button>
      </nav>
    </div>
  </header>

  <main class="container">

    <section class="kpis">
      <div class="kpi-card">
        <span class="kpi-label">Total hoje</span>
        <span class="kpi-value" id="kpi-total">0</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Em preparo</span>
        <span class="kpi-value" id="kpi-preparo">0</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Prontos</span>
        <span class="kpi-value" id="kpi-prontos">0</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Faturamento</span>
        <span class="kpi-value money" id="kpi-faturamento">R$ 0,00</span>
      </div>
    </section>

    <section class="filtros">
      <h2 class="section-title">Pedidos recebidos</h2>

      <div class="filtros-bar">
        <div class="chip-group" id="filtroStatus">
          <button class="chip active" data-status="">Todos</button>
          <button class="chip" data-status="RECEBIDO">Recebidos</button>
          <button class="chip" data-status="PREPARANDO">Preparando</button>
          <button class="chip" data-status="ENVIADO">Enviados</button>
          <button class="chip" data-status="ENTREGUE">Entregues</button>
          <button class="chip" data-status="CANCELADO">Cancelados</button>
        </div>

        <input id="buscaInput" class="busca" placeholder="Buscar cliente ou nº do pedido…">

        <button id="btnAtualizar" class="btn-atualizar" onclick="listarPedidos()">
          <span class="dot"></span> Atualizar
        </button>
      </div>
    </section>

    <section class="pedidos" id="pedidosLista">
      <p class="empty-msg">Carregando pedidos…</p>
    </section>

  </main>

  <script src="../config.js"></script>
  <script src="../auth.js"></script>
  <script src="../shared.js"></script>
  <script src="script_painel_pedidos.js"></script>
</body>
</html>
