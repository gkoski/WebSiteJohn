<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Mr. John Sports Bar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23C5392B'/><text x='50%25' y='70%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia, serif' font-weight='900' font-style='italic' font-size='40' fill='%23F2E5D0'>J</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Bagel+Fat+One&family=Caveat+Brush&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="login.css">
</head>

<body>
<div class="container">
  <div class="logo">
    <img src="../assets/logo-mrjohn.webp" alt="Logo Mr. John Sports Bar">
  </div>

  <div class="card">
    <h2>Login</h2>

    <form id="form">
      <div class="input-group" id="emailGroup">
        <input type="email" id="email" placeholder="E-mail">
        <div class="error">E-mail obrigatório ou inválido</div>
      </div>

      <div class="input-group" id="senhaGroup">
        <input type="password" id="senha" placeholder="Senha">
        <div class="error">Senha obrigatória</div>
      </div>

      <button type="submit">Entrar</button>

      <div class="terms" style="justify-content: center; margin-top: 20px;">
        <span>Novo por aqui? <a href="../cadastro/cadastro.html">Cadastre-se</a></span>
      </div>
    </form>
  </div>
</div>

<script src="../config.js"></script>
<script src="../shared.js"></script>
<script src="login.js"></script>
</body>
</html>
