<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Mr. John Sports Bar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23C5392B'/><text x='50%25' y='70%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia, serif' font-weight='900' font-style='italic' font-size='40' fill='%23F2E5D0'>J</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Bagel+Fat+One&family=Caveat+Brush&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="login.css">
</head>

<body>
<div class="container">
  <div class="logo">
    <img src="../assets/logo-mrjohn.webp" alt="Logo Mr. John Sports Bar">
  </div>

  <div class="card">
    <h2>Login</h2>

    <form id="form">
      <div class="input-group" id="emailGroup">
        <input type="email" id="email" placeholder="E-mail">
        <div class="error">E-mail obrigatório ou inválido</div>
      </div>

      <div class="input-group" id="senhaGroup">
        <div class="senha-wrap">
          <input type="password" id="senha" placeholder="Senha">
          <button type="button" class="toggle-senha" data-target="senha"
                  aria-label="Mostrar senha" aria-pressed="false">
            <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6.5 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3.5 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          </button>
        </div>
        <div class="error">Senha obrigatória</div>
      </div>

      <button type="submit">Entrar</button>

      <div class="terms" style="justify-content: center; margin-top: 20px;">
        <span>Novo por aqui? <a href="../cadastro/cadastro.html">Cadastre-se</a></span>
      </div>
    </form>
  </div>
</div>

<script src="../config.js"></script>
<script src="../shared.js"></script>
<script src="../password-toggle.js"></script>
<script src="login.js"></script>
</body>
</html>
