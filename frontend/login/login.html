<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Mr. John Sports Bar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="login.css"> 
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
<div class="container">
  <div class="logo">
    <img src="https://painel.lipplead.com/wp-content/uploads/2026/03/sem20fundo202062201_converted.webp">
  </div>

  <div class="card">
    <h2>Login</h2>

    <form id="form">
      <div class="input-group" id="emailGroup">
        <input type="email" id="email" placeholder="E-mail">
        <div class="error">E-mail obrigatório ou inválido</div>
      </div>

      <div class="input-group" id="senhaGroup">
        <input type="password" id="senha" placeholder="Senha">
        <div class="error">Senha obrigatória</div>
      </div>

      <button type="submit">Entrar</button>

      <div class="terms" style="justify-content: center; margin-top: 20px;">
        <span>Novo por aqui? <a href="../cadastro/cadastro.html" style="color: #e50914; text-decoration: none; font-weight: 600;">Cadastre-se</a></span>
      </div>
    </form>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
